{% extends "base.html" %}

{% block title %}Add Department{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="table-card">
            <h4 class="mb-4 fw-bold">
                <i class="fas fa-building me-2 text-primary"></i>Add New Department
            </h4>
            
            <form method="POST">
                <div class="row">
                    <div class="col-md-12 mb-3">
                        <label for="name" class="form-label fw-bold">Department Name *</label>
                        <input type="text" class="form-control" id="name" name="name" required 
                               placeholder="e.g., Information Technology">
                    </div>
                    
                    <div class="col-md-6 mb-3">
                        <label for="manager" class="form-label fw-bold">Manager Name</label>
                        <input type="text" class="form-control" id="manager" name="manager" 
                               placeholder="e.g., John Smith">
                    </div>
                    
                    <div class="col-md-6 mb-3">
                        <label for="budget" class="form-label fw-bold">Annual Budget (₹)</label>
                        <input type="number" class="form-control" id="budget" name="budget" step="10000"
                               placeholder="e.g., 500000">
                    </div>
                    
                    <div class="col-md-12 mb-3">
                        <label for="description" class="form-label fw-bold">Description</label>
                        <textarea class="form-control" id="description" name="description" rows="4" 
                                  placeholder="Describe the department's responsibilities..."></textarea>
                    </div>
                </div>
                
                <div class="d-flex gap-2 mt-3">
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-save me-2"></i>Save Department
                    </button>
                    <a href="{{ url_for('departments') }}" class="btn btn-secondary">
                        <i class="fas fa-times me-2"></i>Cancel
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
